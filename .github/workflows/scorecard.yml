name: OSSF Scorecard

# OSSF Scorecards (https://github.com/ossf/scorecard) check the repo
# against ~18 security/best-practice signals (branch protection,
# pinned actions, code review, signed releases, ...) and publish
# results to GitHub code-scanning.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 5 * * 1"   # 05:00 UTC every Monday
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write   # for SARIF upload to code-scanning
      id-token: write          # for OIDC publishing
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # publishes to scorecard.dev

      - uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: scorecard
