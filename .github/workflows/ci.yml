name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # for SARIF upload from Slither

jobs:
  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          target: "."
          slither-config: "slither.config.json"
          fail-on: medium
          sarif: results.sarif
      - name: Upload SARIF to GitHub code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
          category: slither
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slither-sarif
          path: ${{ steps.slither.outputs.sarif }}
          if-no-files-found: ignore

  foundry-fuzz:
    name: Foundry fuzz tests (256 runs/test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - name: Install Node deps (for OZ contracts on remapping)
        run: npm ci
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install forge-std
        run: forge install foundry-rs/forge-std --no-git
      - name: forge build
        run: forge build --sizes
      - name: forge test
        run: forge test -vv
      - name: Forge coverage (best effort)
        run: forge coverage --report lcov || true
        continue-on-error: true
      - name: Upload forge coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-coverage
          path: lcov.info
          if-no-files-found: ignore

  build-test:
    name: Build + test (WASM + Solidity + parity)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint Solidity (solhint)
        run: npm run lint:sol

      - name: Validate rule JSON against schema
        run: npx hardhat validate:rules

      - name: Build WASM
        run: npm run wasm:build

      - name: Compile contracts
        run: npm run compile

      - name: WASM unit tests
        run: npm run wasm:test

      - name: Hardhat tests (unit + parity + revert + lifecycle)
        run: npm test

      - name: Gas report (per-function via gas-reporter)
        run: REPORT_GAS=true npm test 2>&1 | tee gas-report.txt
        continue-on-error: true

      - name: Gas benchmarks (per-strategy lifecycle)
        run: npm run bench
        continue-on-error: true

      - name: Solidity coverage
        run: npm run coverage 2>&1 | tee coverage-summary.txt
        continue-on-error: true

      - name: Build UI bundle
        run: npm run ui:build

      - name: Upload gas report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: |
            gas-report.txt
            RESULTS.md
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solidity-coverage
          path: |
            coverage/
            coverage.json
            coverage-summary.txt
          if-no-files-found: ignore

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: wasm/build/
          if-no-files-found: error

      - name: Upload UI bundle
        uses: actions/upload-artifact@v4
        with:
          name: ui-bundle
          path: dist/ui/
          if-no-files-found: ignore

  besu-e2e:
    name: Besu IBFT2 end-to-end deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run wasm:build && npm run compile
      - name: Start Besu
        run: |
          docker compose -f besu/docker-compose.yml up -d
          echo "Waiting for Besu to be ready and producing blocks..."
          for i in {1..60}; do
            BLOCK=$(curl -s -X POST -H "Content-Type: application/json" \
                --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                http://127.0.0.1:8545 | grep -oE '"result":"0x[0-9a-f]+"' || true)
            if [ -n "$BLOCK" ]; then
              echo "Besu up: $BLOCK"; exit 0
            fi
            sleep 2
          done
          echo "Besu failed to start"
          docker compose -f besu/docker-compose.yml logs --tail=50
          exit 1
      - name: Deploy ALL 8 rules on Besu
        run: npx hardhat deploy:all --network besu

      - name: Compare WASM ↔ chain for one rule
        run: npx hardhat compare:rule --rule rules/examples/01-simple-act360.json --network besu

      - name: Upload deployment receipts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: besu-deployments
          path: .deployments/besu.json
          if-no-files-found: ignore
      - name: Show deployment receipts
        if: always()
        run: cat .deployments/besu.json || true
      - name: Besu logs (on failure)
        if: failure()
        run: docker compose -f besu/docker-compose.yml logs --tail=100
      - name: Stop Besu
        if: always()
        run: docker compose -f besu/docker-compose.yml down -v
