name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build + test (WASM + Solidity + parity)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint Solidity (solhint)
        run: npm run lint:sol

      - name: Validate rule JSON against schema
        run: npm run validate:rules

      - name: Build WASM
        run: npm run wasm:build

      - name: Compile contracts
        run: npm run compile

      - name: WASM unit tests
        run: npm run wasm:test

      - name: Hardhat tests (unit + parity + revert + lifecycle)
        run: npm test

      - name: Gas report
        run: REPORT_GAS=true npm test 2>&1 | tee gas-report.txt
        continue-on-error: true

      - name: Solidity coverage
        run: npm run coverage 2>&1 | tee coverage-summary.txt
        continue-on-error: true

      - name: Upload gas report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solidity-coverage
          path: |
            coverage/
            coverage.json
            coverage-summary.txt
          if-no-files-found: ignore

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: wasm/build/
          if-no-files-found: error

  besu-e2e:
    name: Besu IBFT2 end-to-end deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-test
    if: false   # enabled in iter 4 once real genesis is generated
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run wasm:build && npm run compile
      - name: Start Besu
        run: |
          docker compose -f besu/docker-compose.yml up -d
          for i in {1..30}; do
            if curl -s -X POST -H "Content-Type: application/json" \
                --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                http://127.0.0.1:8545 | grep -q result; then
              echo "Besu up"; exit 0
            fi
            sleep 2
          done
          echo "Besu failed to start"; exit 1
      - name: Deploy a rule
        run: |
          RULE=rules/examples/01-simple-act360.json npx hardhat run scripts/deploy.ts --network besu
      - name: Stop Besu
        if: always()
        run: docker compose -f besu/docker-compose.yml down
