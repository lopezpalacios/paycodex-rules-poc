name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write   # for creating releases
  packages: write  # for pushing the backend image to ghcr.io

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel mid-release

jobs:
  build-and-release:
    name: Build artifacts + create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # so version derivation can see tags

      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build WASM (release)
        run: npm run wasm:build

      - name: Compile contracts
        run: npm run compile

      - name: Build UI bundle
        run: npm run ui:build

      - name: Validate rules
        run: npm run validate:rules

      - name: Package WASM
        run: |
          mkdir -p release
          cd wasm/build && zip -r ../../release/paycodex-rules-wasm-${{ steps.tag.outputs.tag }}.zip . && cd -

      - name: Package UI bundle
        run: |
          cd dist/ui && zip -r ../../release/paycodex-rules-ui-${{ steps.tag.outputs.tag }}.zip . && cd -

      - name: Package compiled artifacts (Hardhat ABIs)
        run: |
          cd artifacts && zip -r ../release/paycodex-rules-artifacts-${{ steps.tag.outputs.tag }}.zip contracts/ && cd -

      - name: Package rule examples
        run: |
          cd rules && zip -r ../release/paycodex-rules-examples-${{ steps.tag.outputs.tag }}.zip examples/ schema.json && cd -

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          # Pull the most recent "## [Unreleased]" or "## [vX.Y.Z]" section
          awk '/^## \[/{c++} c==1{print} c==2{exit}' CHANGELOG.md > release-notes.md
          echo "Wrote $(wc -l < release-notes.md) lines"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md
          files: |
            release/*.zip
          generate_release_notes: false
          fail_on_unmatched_files: true

  publish-backend-image:
    name: Build + push backend image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/lopezpalacios/paycodex-rules-poc-backend:${{ steps.tag.outputs.tag }}
            ghcr.io/lopezpalacios/paycodex-rules-poc-backend:latest
          labels: |
            org.opencontainers.image.source=https://github.com/lopezpalacios/paycodex-rules-poc
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
            org.opencontainers.image.licenses=MIT
          # Supply-chain attestations attached to the manifest:
          # - sbom: SPDX inventory of every layer's packages
          # - provenance: SLSA build provenance (max = full attestation)
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
