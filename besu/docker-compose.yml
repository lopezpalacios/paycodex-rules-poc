services:
  besu:
    image: hyperledger/besu:24.3.0
    container_name: paycodex-besu
    restart: unless-stopped
    user: root              # dev-only: avoid /data perm issues with named volume
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303"
    volumes:
      - ./genesis.json:/config/genesis.json:ro
      - ./key:/config/key:ro
      - besu-data:/data
    command:
      - --data-path=/data
      - --genesis-file=/config/genesis.json
      - --node-private-key-file=/config/key
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-cors-origins=all
      - --rpc-http-api=ETH,NET,WEB3,IBFT,ADMIN,DEBUG,TXPOOL
      - --rpc-ws-enabled
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --host-allowlist=*
      - --min-gas-price=0
      - --logging=INFO

  web3signer:
    image: consensys/web3signer:26.4.2
    container_name: paycodex-web3signer
    restart: unless-stopped
    depends_on:
      - besu
    ports:
      - "9000:9000"
    volumes:
      - ./web3signer/keys:/keys:ro
    command:
      - --key-store-path=/keys
      - --http-listen-host=0.0.0.0
      - --http-listen-port=9000
      - --http-cors-origins=all
      - --http-host-allowlist=*
      - eth1
      - --downstream-http-host=besu
      - --downstream-http-port=8545
      - --chain-id=1337

  backend:
    profiles: ["backend"]   # opt-in: `docker compose --profile backend up`
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: paycodex-backend
    restart: unless-stopped
    depends_on:
      - besu
      - web3signer
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NETWORK: "besu"
      WEB3SIGNER_URL: "http://web3signer:9000"
      PAYCODEX_BLOCKLIST: "/app/data/sanctions/blocklist.json"
      # Secrets injected from .env or runtime — never bake into image
      PAYCODEX_API_KEYS: "${PAYCODEX_API_KEYS:-}"
      PAYCODEX_ADMIN_KEYS: "${PAYCODEX_ADMIN_KEYS:-}"
      PAYCODEX_RATE_LIMIT_MAX: "${PAYCODEX_RATE_LIMIT_MAX:-5}"
      PAYCODEX_RATE_LIMIT_WINDOW_MS: "${PAYCODEX_RATE_LIMIT_WINDOW_MS:-86400000}"
      PAYCODEX_REQUIRE_INTENT: "${PAYCODEX_REQUIRE_INTENT:-false}"
    volumes:
      - ../.deployments:/app/.deployments:ro

volumes:
  besu-data:
