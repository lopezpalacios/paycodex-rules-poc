<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>paycodex-rules-poc — interest rule sandbox</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace; max-width: 980px; margin: 2rem auto; padding: 0 1rem; color: #1c1c1c; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.05rem; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    label { display: block; margin: 0.4rem 0 0.15rem; font-size: 0.85rem; color: #555; }
    input, select, textarea { width: 100%; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 0.85rem; }
    textarea { font-family: monospace; min-height: 240px; }
    button { padding: 0.5rem 1rem; margin-top: 0.6rem; cursor: pointer; background: #1d4ed8; color: white; border: none; border-radius: 4px; font-weight: 600; }
    button:hover { background: #2747c6; }
    .out { background: #f6f8fa; border-radius: 4px; padding: 0.6rem; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; }
    .row { margin-bottom: 0.4rem; }
    .pill { display: inline-block; padding: 0.1rem 0.5rem; background: #e0e7ff; color: #1d4ed8; border-radius: 999px; font-size: 0.7rem; }
  </style>
</head>
<body>
  <h1>paycodex-rules-poc <span class="pill">WASM ↔ Solidity preview</span></h1>
  <p>Pick a rule, edit parameters, see WASM-computed accrual schedule. Deploy the matching Solidity strategy via Hardhat (separate CLI).</p>

  <div class="grid">
    <div>
      <h2>Rule</h2>
      <label for="rule">Example</label>
      <select id="rule">
        <option value="01-simple-act360.json">01 — Simple act/360 fixed 3.50%</option>
        <option value="02-compound-daily.json">02 — Compound daily 30/360</option>
        <option value="03-tiered-savings.json">03 — Tiered (corporate)</option>
        <option value="04-floating-estr.json">04 — Floating €STR + 50bps</option>
        <option value="05-esg-kpi.json">05 — ESG KPI ±100bps</option>
        <option value="06-floor-cap.json">06 — Floor 0%, Cap 10%</option>
        <option value="07-two-track-ecr.json">07 — Two-track ECR/hard 50/50</option>
        <option value="08-ch-withholding.json">08 — CH 35% Verrechnungssteuer</option>
      </select>
      <label for="ruleJson">JSON (editable)</label>
      <textarea id="ruleJson"></textarea>
    </div>
    <div>
      <h2>Inputs</h2>
      <label for="balance">Balance (base units)</label>
      <input id="balance" type="text" value="1000000" />
      <label for="days">Period (days)</label>
      <input id="days" type="number" value="360" />
      <label for="oracle">Oracle rate (bps, floating only)</label>
      <input id="oracle" type="number" value="350" />
      <label for="kpi">KPI delta (bps, kpi-linked only)</label>
      <input id="kpi" type="number" value="-25" />
      <button id="run">Preview accrual</button>
      <h2>Output</h2>
      <div id="output" class="out">— pick a rule and click preview —</div>
    </div>
  </div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
