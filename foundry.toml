[profile.default]
src = "contracts"
test = "test/foundry"
out = "out"
cache_path = "cache_forge"
libs = ["node_modules", "lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256
seed = "0x1337"
max_test_rejects = 65536

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 140
multiline_func_header = "all"
quote_style = "double"
tab_width = 4
